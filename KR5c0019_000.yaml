front:
  text: 太上飛步南斗太微玉經南上太虛真王南嶽赤君松子學道時來即乘龍駕鳳軒於太微之室蘂玉瓊房也偃息朱明坐廕若木消氣於虛藏神於無玄精不開以道為我握固以天上清丹華紫靈真女映曜羅之暉於景霄之外飛登玉緯旋行朱綱招洞陽之真把南辰之柄逍遙太微逸響九清雲回電滿身合杳冥下觀世界以赤君金顔淑資德方行圓心空無塵如夜半月念斷離業如水中蓮以下教赤君上真髙上之道飛斗丹天足躡南辰太微玉經道言空洞植根於有無之表二曜懸精於太虛之間蔓秀芒於兩極之際赤杲流演六星麗天所以大象有物鴻濛發源必自南斗陶冶烹治成焉故六合為匡郭六儀為鼎器兩儀為水火盈縮為進退太一臨爐帝君推策飛丹九千萬歲三辰布煥群星紀綱焉故天為蓋地為輿日月為輪四時為馬巾南辰佩北斗建皇極作萬物是太微妙旨髙真祕言南昌丹陵六星為貴躡之者先知真名然後佩服真形有履其魂次躡其魄然後登星往返三周六辰映形行之五年為上清之真九年見六真告其至情與兆同倫十五年手結朱網坐主萬靈乘六飛龍升乎玉清
