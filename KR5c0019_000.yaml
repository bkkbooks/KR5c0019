body:
  text: 南斗六星眞花闊廉持竟井一星符二星符三星符四星符五星符六星符丹書青素方六寸三日六日十六日二十三日二十六日南向再拜服之祝曰太微緑景眞炁洞開絳珠丹實貫蒂玉階彤光寶宮龍虎紫文有無嬰兒朱綉錦裙腰帶玉鈴對御北清吞芒躡景與帝同興鳯輦虎旗翊侍眞𡖥我爲道主億劫無傾又丹書青素廣等六寸錦囊帶心前飛登行事凶事悉解著新淨衣五星魂名玦珍珀琳瑛魂五星自玦歩起雙足至瑛上徃返上過存我同登星有五眞人著朱衣戴玉冠形如嬰兒與我俱行因垂兩手以二指各捻虎口叩齒五通登言曰巍峩洞清南魂五星流轉天維陟降上靈丹袍玉顔諧我携登神師帝友離合無形坐咤仙聖太極太清身飛迅鳴四一合明歩圍九尺碧地以青㸃星以黃爲綱七星魄名釗鏤鑑鏗鏐鎬鋪魄七星自釗歩起隻足至鋪徃返三過存我登星有七玉女著黄衣頂寳髻形如嬰兒與我同行因舉兩手以大指捻三指根紋叩齒七通登言曰旋朱貫霞孕光丹靈七玉女美媚蔓天精縝雲散絲黄裳大神坐神草昧含引氤氳與我道樞靈邁苦塵金輦大輅龍衣被身正坐明堂衙烈萬神扶登七映調理玉清歩圍九尺碧地以黄㸃星以朱爲綱毎歩魂魄時一星輒祝一名存一神後亦如之燒香左右飛斗六辰之道約其歩之修阻凡雙足一歩不可至星當縁綱爲丁綱令至星上雙足可也雙足歩星不可及者復雙足縁綱令隻足據綱可也𨾏足躡也雙足歩也躡綱也蹈星綱空位爲仙王六星祕諱朱光帝堯昌明此六星祕諱知之神仙臨星憶之開洞房之光禁萬天之正炁第一寶光玉玄上眞道君治丹玉瓊華藥闕初登第一星時脫履席外先前左足以右足根並前足右二指捻大拇指根紋垂左手三咽氣存玉玄上眞道君著丹錦朱袍狀如嬰兒在天星藥闕中口吐紫炁注我百骸煥然金光與空等無異色我當忘形祝曰煥然太極神光流金丹華紫闕上上髙尊化玉孩子開我金門紫霄鬱回洞煥九清渺㝠虛觀恍惚忘形主生帝宮爲至道根右名曰謁星玉玄第二丹精玄明寶室上眞道君治七寶藥金華闕登第二星時以右手按山源以左手按兩眉之交三九過閉炁七息存寶室上眞道君著紫綉羽袍腰流金鈴狀如嬰兒坐丹牀道君兩手携南斗六星如絳弦貫流珠丹光煥徹擲入我泥丸中令定位照我身神森然如纍目瞳祝曰身浮丹綱履登神精寶室眞王呼吸風雷繙珠糅𡖥飛景泥丸紫黃轉回金房炁宣俯控億空形載飛龍右名曰丹精鍊生第三靈瑶寶曜赤天上眞道君治金洞虹城丹英光闕登苐三星時以手掩兩耳俯存我足下周回五百里轉如車輪有紫雲合沸如釡中湯聲沸氣鼓數百千里雷星光中有嬰兒無衣長六分自星中跳入我口中下極紫戸祝曰朱烟洞合星光交緾黃淫髙空鎮制赤天通我心神化景玉仙乗炁涵風身入玉房笑辱庶𢑥垂裳帝軒調丹布黄眞宰眞君右名曰飛眞化形第四景明碧虚眞王天徳上眞道君治九靈粹極紫陽朗訣金明玉闕登第四星時垂手左右握都關目閉炁登星在星開如蓮花見道君柔形嬰兒著緑錦寳衣手柄金銊坐青玉之猊座口吐青炁入我肝中九過思肝中之氣化成寳珠光流威明内有童子巾青帔玄手援玉琴其聲漻然透一體內間關平怡良久祝曰天魂九靈火弟木兄生光滋流鬱葱精明道君柄銊童子鼓琴青烟妙微薰我神窗面見紫皇錫我帝臺虎書金廓建候北清金形飛空神道一㝠右名曰凝精華童第五極眞太玄寶仙玉皇太上上眞道君治紫暉霞陽洞神玉闕登第五星時叉子當星跪叩齒七通閉炁次以手鳴腦戸令習習有聲思見風雷水火勃發左右我因藏氣星光之心忘形棄生不知所之又憶我身忽成嬰兒著朱花綉帔溶溶於内祝曰眞極亦化化極歸眞水火風雷役使萬灵忘我生死徹知幽㝠念失氣寐天地返相以憶所至湛然之身胎形芳雅仁徳回元超神刼初與混茫井右名曰攝生遯眞第六紫宸絳房玄玄大帝玉眞上徳道君治光玉玄臺六華雲闕登第六星時正身向圖再拜閉炁思星出一龍龍作珠色靈光紫霞散照無外六星魂魄及以神身携手笑接乗龍髙昇碧霄蘂彩億萬之程上合空洞無眞之眞再拜祝曰六氣浩蕩爲道爲玄神物無常隨作隨遷我入天一混化精輪萬萬離合長獲勝先燕登金闕循蕳帝眞褁囊隂陽再光再冒聖人神人是空是塵右名曰攝眞六龍歩祝都竟貯圖函中焼香乃復六星南辰朱綱上道以授髙眞之得道者翺翔玉清玉帝髙靈上清丹華紫靈眞女始學赤君赤君授我於丹玉瓊闕絳臺鳳軒之聞得之者位爲仙𡖖行之者爲太上眞人矣盟用金珠六枚絳紋六十尺以贄告南辰奉禮六眞慢之者不得爲仙三官考魂此至道之精眞玄之毋也太上飛歩南斗太微玉經
