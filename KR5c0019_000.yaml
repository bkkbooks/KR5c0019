front:
  text: 太上飛歩南斗太微玉經南上太虚眞王南嶽赤君松子學道時來即乗龍駕鳳軒於太微之室蘂玉瓊房也偃息朱明坐廕若木消炁於虚藏神於無玄精不開以道爲我握固以天上清丹華紫靈眞女映曜羅之暉於景霄之外飛登玉緯旋行朱綱招洞陽之眞把南辰之柄逍遥太微逸響九清雲回電滿身合杳冥下觀世界以赤君金顔淑資徳方行圓心空無塵如夜半月念斷離業如水中蓮以下教赤君上眞髙上之道飛斗丹天足躡南辰太微玉經道言空洞植根於有無之表二曜懸精於太虚之間蔓秀芒於兩極之際赤杲流演六星麗天所以大象有物鴻濛發源必自南斗陶冶烹治成焉故六合爲匡郭六儀爲鼎器兩儀爲水火盈縮爲進退太一臨爐帝君推策飛丹九千萬歳三辰布煥群星紀綱焉故天爲蓋地爲輿日月爲輪四時爲馬巾南辰佩北斗建皇極作萬物是太微妙㫖髙眞祕言南昌丹陵六星爲貴躡之者先知眞名然後佩服眞形有履其魂次躡其魄然後登星徃返三周六辰映形行之五年爲上清之眞九年見六眞告其至情與兆同倫十五年手結朱網坐主萬靈乗六飛龍昇乎玉清
